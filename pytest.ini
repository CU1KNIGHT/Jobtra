[pytest]
asyncio_mode = auto
testpaths = App/tests
# Browser-driven UI tests (App/ui_tests) are tagged `ui` and excluded by
# default so the everyday suite stays fast and needs no browser. Run them with:
#   pytest App/ui_tests -m ui
markers =
    ui: end-to-end browser tests (Playwright); excluded by default
addopts = -m "not ui"
